name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Obtener el último tag (default v0.0.0 si no hay ninguno)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # Parsear MAJOR.MINOR.PATCH
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Leer commits desde el último tag (o todos si no hay tag previo)
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log HEAD --pretty=format:"%s")
          fi
          echo "Commits since $LAST_TAG:"
          echo "$COMMITS"

          # Detectar nombre de rama mergeada desde el commit de merge en HEAD
          HEAD_MSG=$(git log -1 --pretty=format:"%s")
          echo "HEAD commit: $HEAD_MSG"

          # Decidir bump basado en rama mergeada (o BREAKING CHANGE como excepción)
          if echo "$COMMITS" | grep -qE "^(feat|fix)!:|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP="major"
          elif echo "$HEAD_MSG" | grep -qE "feature/"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: $BUMP → $NEW_TAG"

          git tag $NEW_TAG
          git push origin $NEW_TAG
