.7 806.1"></polygon></svg>

    <h1>Iniciar sesi&#243;n</h1>
    <p class="login-subtitle">Accede a la documentaci&#243;n con tu cuenta corporativa</p>

    <div class="login-error" id="login-error"></div>

    <!-- Email y contraseña (método principal) -->
    <form id="email-form">
      <div class="login-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="correo@empresa.com" autocomplete="email" required />
      </div>
      <div class="login-field">
        <label for="login-password">Contrase&#241;a</label>
        <div class="login-password-wrapper">
          <input type="password" id="login-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password" required />
          <button type="button" class="login-eye-btn" id="toggle-password" tabindex="-1">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Entrar</button>
    </form>

    <div class="login-divider"><span>o contin&#250;a con</span></div>

    <!-- Google (método secundario) -->
    <div class="google-btn-wrapper">
      <div id="g_id_onload"
        data-client_id="{{googleClientId}}"
        data-callback="onGoogleLogin"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="continue_with"
        data-shape="rectangular"
        data-width="320"
        data-logo_alignment="left">
      </div>
    </div>

  <!-- ===================== APP ===================== -->
  <div id="scalar-app" style="display:none"></div>

  <script>
    // Login con Google: el botón GSI devuelve un ID token (credential) que validamos
    // en identity vía /api/admin/auth/google.
    function onGoogleLogin(response) {
      setError('');
      fetch('/api/admin/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: response.credential })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          var token = data.tokens ? data.tokens.accessToken : data.accessToken;
          if (!token) throw new Error('Credenciales inv\u00e1lidas');
          loadApp(token);
        })
        .catch(function(err) { setError(err.message); });
    }

    // Inyecta la librería GSI bajo demanda (solo en la pantalla de login). GSI procesa
    // el div #g_id_onload y renderiza el botón al cargar.
    function initGoogleSignIn() {
      if (document.getElementById('gsi-client')) return;
      var s = document.createElement('script');
      s.id = 'gsi-client';
      s.src = 'https://accounts.google.com/gsi/client';
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Restaurar sesión si hay token guardado y no ha expirado
      var savedToken = localStorage.getItem('docs_token');
      if (savedToken) {
        try {
          var raw = atob(savedToken.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'));
          var payload = JSON.parse(decodeURIComponent(escape(raw)));
          if (payload.exp && payload.exp * 1000 > Date.now()) {
            loadApp(savedToken);
            return;
          }
        } catch (_) {}
        localStorage.removeItem('docs_token');
      }

      // Solo llegamos aquí si NO hay sesión válida: mostramos login y cargamos Google GSI.
      // (Si ya hay sesión, hicimos return arriba y GSI no se inicializa, así no salta su
      // chequeo de origen ni ensucia la consola estando ya logueado.)
      initGoogleSignIn();

      // Toggle ojo contraseña
      document.getElementById('toggle-password').addEventListener('click', function() {
        var input  = document.getElementById('login-password');
        var eyeOn  = document.getElementById('eye-icon');
        var eyeOff = document.getElementById('eye-off-icon');
        var isPass = input.type === 'password';
        input.type           = isPass ? 'text' : 'password';
        eyeOn.style.display  = isPass ? 'none' : '';
        eyeOff.style.display = isPass ? ''     : 'none';
      });

      // Login con email
      document.getElementById('email-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn   = document.getElementById('login-btn');
        var email = document.getElementById('login-email').value;
        var pass  = document.getElementById('login-password').value;

        btn.disabled = true;
        btn.textContent = 'Verificando...';
        setError('');

        fetch('/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: pass })
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var token = data.tokens ? data.tokens.accessToken : data.accessToken;
            if (!token) throw new Error(data.error || 'Credenciales inv\u00e1lidas');
            loadApp(token);
          })
          .catch(function(err) {
            setError(err.message);
            btn.disabled = false;
            btn.textContent = 'Entrar';
          });
      });
    });

    function setError(msg) {
      var el = document.getElementById('login-error');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function loadApp(token) {
      localStorage.setItem('docs_token', token);
      var raw     = atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'));
      var payload = JSON.parse(decodeURIComponent(escape(raw)));
      var name     = payload.name  || payload.email || 'Admin';
      var email    = payload.email || '';
      var initials = name.split(' ').slice(0, 2).map(function(w) { return w[0]; }).join('').toUpperCase();

      document.getElementById('login-section').style.display = 'none';
      document.body.classList.remove('login-view');
      document.getElementById('scalar-app').style.display = 'block';
      showLoadingOverlay();

      // El endpoint del spec exige el token, así que lo descargamos nosotros con
      // el token y se lo pasamos a Scalar ya resuelto (no puede mandar headers en spec.url).
      fetch('/api/docs/spec', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(res) {
          if (res.status === 401) throw new Error('unauthorized');
          if (!res.ok) throw new Error('spec-error');
          return res.json();
        })
        .then(function(spec) { renderScalar(spec); })
        .catch(function(err) {
          if (err && err.message === 'unauthorized') {
            localStorage.removeItem('docs_token');
            location.reload();
          }
        });

      injectHeader(name, email, initials);
    }

    function renderScalar(spec) {
      // Scalar arranca con un hash en la URL (#description/introduction) y, al montar,
      // hace deep-link a esa sección arrastrando el scroll, lo que oculta el header.
      // Limpiamos el hash y forzamos volver arriba durante el primer segundo de montaje.
      if (location.hash) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      [0, 100, 300, 600, 1000].forEach(function(t) {
        setTimeout(function() { window.scrollTo(0, 0); }, t);
      });

      // Versión fijada + SRI: si el bundle del CDN cambiase (compromiso de la cadena de
      // suministro), el hash no cuadra y el navegador no lo ejecuta. Esta página guarda
      // un JWT de admin en localStorage, así que el script de terceros debe ser inmutable.
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.60.0/dist/browser/standalone.min.js';
      script.integrity = 'sha384-4BdmZQQTc462+ocGPo+GP3Hi/eQjMQTmNkSU9J5w3FD6hGUEmU2PqNRnbklONt4R';
      script.crossOrigin = 'anonymous';
      script.onload = function() {
        Scalar.createApiReference('#scalar-app', {
          content: spec,
          layout: 'classic',
          showDeveloperTools: 'never',
          // Sin proxy de Scalar: las peticiones de prueba no transitan por api.scalar.com
          // (evita fugas y silencia los errores de CSP a ese host).
          proxyUrl: '',
          defaultOpenAllTags: true,
          hideDarkModeToggle: false,
          theme: 'default',
          darkMode: false,
          hideClientButton: false,
          showSidebar: true,
          operationTitleSource: 'summary',
          persistAuth: false,
          isEditable: false,
          hideModels: false,
          documentDownloadType: 'none',
          hideTestRequestButton: false,
          hideSearch: false,
          showOperationId: false,
          withDefaultFonts: true,
          expandAllModelSections: false,
          expandAllResponses: false,
          orderSchemaPropertiesBy: 'alpha',
          orderRequiredPropertiesFirst: true
        });
      };
      document.head.appendChild(script);
    }

    // Header sticky propio arriba del todo: logo de TotalRenting a la izquierda y
    // widget de usuario (avatar + nombre/email + logout) a la derecha.
    function injectHeader(name, email, initials) {
      if (document.querySelector('.tr-header')) return;

      var header = document.createElement('header');
      header.className = 'tr-header';

      // Logo: clonamos el SVG del login, que sigue en el DOM aunque est\u00e9 oculto.
      var logoWrap = document.createElement('div');
      logoWrap.className = 'tr-header-logo';
      var loginSvg = document.querySelector('#login-section .login-logo svg');
      if (loginSvg) logoWrap.appendChild(loginSvg.cloneNode(true));

      // Construimos el widget con createElement + textContent (no innerHTML) para que
      // name/email del JWT no puedan inyectar HTML/JS en la p\u00e1gina.
      var widget = document.createElement('div');
      widget.className = 'tr-user-widget';

      var avatar = document.createElement('div');
      avatar.className = 'tr-user-avatar';
      avatar.textContent = initials;

      var info = document.createElement('div');
      info.className = 'tr-user-info';
      var nameEl = document.createElement('span');
      nameEl.className = 'tr-user-name';
      nameEl.textContent = name;
      var emailEl = document.createElement('span');
      emailEl.className = 'tr-user-email';
      emailEl.textContent = email;
      info.appendChild(nameEl);
      info.appendChild(emailEl);

      var menu = document.createElement('div');
      menu.className = 'tr-menu-dropdown';
      var logoutBtn = document.createElement('button');
      logoutBtn.className = 'tr-logout-item';
      logoutBtn.textContent = 'Cerrar sesi\u00f3n';
      menu.appendChild(logoutBtn);

      widget.appendChild(avatar);
      widget.appendChild(info);
      widget.appendChild(menu);

      header.appendChild(logoWrap);
      header.appendChild(widget);
      var app = document.getElementById('scalar-app');
      document.body.insertBefore(header, app);

      widget.addEventListener('click', function(e) {
        e.stopPropagation();
        menu.classList.toggle('open');
      });
      document.addEventListener('click', function() {
        menu.classList.remove('open');
      });
      logoutBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        localStorage.removeItem('docs_token');
        location.reload();
      });

      alignHeaderToContent(header);
    }

    // Overlay de carga: tapa el rato en que Scalar monta y el header aún no está
    // alineado, para no mostrarlo mal encuadrado.
    function showLoadingOverlay() {
      if (document.querySelector('.tr-loading-overlay')) return;
      var ov = document.createElement('div');
      ov.className = 'tr-loading-overlay';
      ov.innerHTML = '<div class="tr-spinner"></div>';
      document.body.appendChild(ov);
    }

    function hideLoadingOverlay() {
      var ov = document.querySelector('.tr-loading-overlay');
      if (ov) ov.remove();
    }

    // Alinea el contenido del header (logo / usuario) con el bloque de contenido
    // centrado de Scalar: el logo cuadra con el borde izquierdo del contenido y el
    // widget con el derecho. Scalar centra con márgenes automáticos según el viewport,
    // así que medimos la sección en runtime y reajustamos al redimensionar.
    function alignHeaderToContent(header) {
      function apply() {
        var section = document.querySelector('#scalar-app section.section')
                   || document.querySelector('#scalar-app section');
        if (!section) return false;
        var rect = section.getBoundingClientRect();
        if (rect.width === 0) return false;
        header.style.paddingLeft  = Math.max(0, rect.left) + 'px';
        header.style.paddingRight = Math.max(0, window.innerWidth - rect.right) + 'px';
        return true;
      }

      // Una vez alineado (o si Scalar tarda demasiado), revelamos el header y
      // quitamos el overlay de carga.
      function reveal() {
        header.classList.add('is-ready');
        hideLoadingOverlay();
      }

      // Scalar monta de forma asíncrona: reintenta hasta que exista la sección.
      var tries = 0;
      var timer = setInterval(function() {
        if (apply()) { clearInterval(timer); reveal(); }
        else if (++tries > 40) { clearInterval(timer); reveal(); }
      }, 150);

      window.addEventListener('resize', apply);
    }
  </script>
